<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <h1>This Tutorial is for LOOPS.</h1>
    <h5>Count of 1 to 10 using For Loops.</h5>
    <div id="for_loop"></div>
    <script>
        for(let i= 0; i <= 10 ; i++){
            document.getElementById("for_loop").innerHTML = i;
        }
    </script>
</body>
</html>
